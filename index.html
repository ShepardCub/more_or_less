<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Devine le Nombre</title>
    <link rel="stylesheet" href="stylesheet.css">
    <script src="./src/game.js" defer></script>

    <script src="script.js" defer></script>
    <script src="./src/shop.js" defer></script>
</head>

<body>

    <div class="game-container">
        <h1>🎯 Devine le nombre</h1>
        <p>Choisis un nombre entre 1 et 100</p>

        <input type="number" id="guessInput" min="1" max="100">
        <button id="checkBtn">Valider</button>

        <div class="message" id="message"></div>
        <div class="score" id="wins"></div>
        <div class="score" id="attempts"></div>

        <button class="restart" id="restartBtn">Recommencer</button>

        <button id="shopBtn">🛒 Magasin</button>

        <div id="shop" class="shop" style="display:none;">
            <h2>Magasin</h2>

            <button class="buy" data-item="direction">🌈 Direction (3)</button>
            <button class="buy" data-item="gold">✨ Bordure dorée (5)</button>
            <button class="buy" data-item="proximity">🌈 Proximity (3)</button>

            

            <button id="closeShop">Fermer</button>
        </div>
    </div>

</body>

</html>
